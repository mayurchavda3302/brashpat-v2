{% extends 'dashboard/base.html' %}

{% block page_title %}Confirm Deletion{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm border-0 border-top border-danger border-3">
            <div class="card-body p-4 text-center">
                <div class="text-danger mb-3">
                    <i class="fas fa-exclamation-triangle fa-3x"></i>
                </div>
                <h4 class="mb-3 fw-bold">Are you sure?</h4>
                <p class="text-muted mb-4">
                    Are you sure you want to delete "{{ object }}"? This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{{ cancel_url }}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
